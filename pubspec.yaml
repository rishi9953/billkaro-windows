name: billkaro
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Utility
  cupertino_icons: ^1.0.8
  gap: ^3.0.1
  lottie: ^3.3.2
  flutter_svg: ^2.2.1
  shimmer: ^3.0.0
  dotted_line: ^3.2.3
  dotted_border: ^3.1.0
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  showcaseview: ^3.0.0

  # State Management
  get: ^4.7.2

  # Location & Maps
  google_maps_flutter: ^2.13.1
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  speech_to_text: ^7.3.0

  # System & Data
  shared_preferences: ^2.5.3
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  http: ^1.5.0
  path_provider: ^2.1.1
  flutter_dotenv: ^5.1.0

  # Bluetooth & Printing
  flutter_thermal_printer: ^1.2.4
  flutter_blue_plus: ^2.0.0
  printing: ^5.14.2
  pdf: ^3.11.3

  # Contacts & Media
  image_picker: ^1.2.0
  flutter_contacts: ^1.1.9+2

  # Network & Logging
  dio: ^5.9.0
  retrofit: ^4.4.2
  talker_dio_logger: ^5.0.0
  

  # Twilio SMS
  twilio_flutter: ^0.9.0

  # Flutter Localization
  flutter_localizations:
    sdk: flutter

  json_annotation: ^4.9.0

  qr_flutter: ^4.1.0
  analyzer: ^8.2.0
  syncfusion_flutter_xlsio: ^31.2.15
  share_plus: ^12.0.1
  device_info_plus: ^12.3.0
  # developer_mode_finder: ^1.0.1
  fl_chart: ^1.1.1
  open_file: ^3.5.10
  flutter_animate: ^4.5.2
  path: ^1.9.1
  drift: ^2.12.0
  drift_flutter:
  workmanager: ^0.9.0+3
  esc_pos_utils_plus: ^2.0.4
  flutter_bluetooth_serial_plus: ^0.5.1
  razorpay_flutter: ^1.4.0
  flutter_local_notifications: ^17.2.3
  google_mlkit_text_recognition: ^0.13.1
  google_mlkit_image_labeling: ^0.12.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.16

  # Code Generation
  drift_dev: ^2.12.0
  json_serializable: ^6.8.0
  retrofit_generator: ^10.0.2
  flutter_gen_runner: ^5.6.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/lottie/
    - assets/lottie/loading.json
    - assets/svg/
    - .env

  fonts:
    - family: Lexend
      fonts:
        - asset: assets/fonts/Lexend.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400

flutter_gen:
  integrations:
    flutter_svg: true
